repos:
  - repo: https://github.com/pycqa/flake8
    rev: 7.2.0
    hooks:
      - id: flake8
        exclude: ^alembic/

  - repo: local
    hooks:
      - id: pytest-cov
        name: tests (≥ 80% coverage)
        entry: bash scripts/run_tests.sh
        language: system
        pass_filenames: false
        always_run: true
